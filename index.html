<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker System</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Style CSS -->
    <link rel="stylesheet" href="./style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a1c4fd">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>

<body>

    <div class="main">
        <h1>Budget Tracker System</h1>
        <button id="installBtn" class="btn btn-success mb-3" style="display:none;">
    Install App
</button>
        <div class="budget-container row">
            <!-- Add Budget + Expense -->
            <div class="add-container col-12 col-md-4">
                <div class="add-budget-container">
                    <h4>Add Budget</h4>
                    <form>
                        <div class="form-group">
                            <label for="budget">Budget:</label>
                            <input class="form-control" type="number" id="budget" min="0" step="0.01">
                        </div>
                        <button class="btn btn-primary form-control">Add Budget</button>
                    </form>
                </div>
                <div class="add-expense-container mt-4">
                    <h4>Add Expense</h4>
                    <form>
                        <div class="form-group">
                            <label for="expense">Expense Title:</label>
                            <input class="form-control" type="text" id="expense">
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount:</label>
                            <input class="form-control" type="number" id="amount" min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="category">Category:</label>
                            <select class="form-control" id="category">
                                <option value="Food">Food</option>
                                <option value="Bills">Bills</option>
                                <option value="Transport">Transport</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <button class="btn btn-primary form-control">Add Expense</button>
                    </form>
                </div>
                <button class="btn btn-danger form-control mt-2" onclick="resetAll()">Reset All</button>
            </div>

            <!-- Display Budget + Expenses + Chart -->
            <div class="display-container col-12 col-md-8">
                <div class="heading row text-center">
                    <div class="alert alert-primary col">
                        Total Budget: <span id="totalBudget">0</span>
                    </div>
                    <div class="alert alert-primary col">
                        Total Expenses: <span id="totalExpenses">0</span>
                    </div>
                    <div class="alert alert-primary col">
                        Budget Left: <span id="budgetLeft">0</span>
                    </div>
                </div>
                <hr>
                <div class="table-container table-responsive">
                    <h5>Expense History:</h5>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Expense Name</th>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5">No expenses yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <button class="btn btn-info mb-3" id="toggleChartBtn">Expense Breakdown</button>

                <div id="chartContainer" style="display: none; max-width: 400px; margin: auto;">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Script JS -->
    <script src="./script.js"></script>
</body>

</html>
